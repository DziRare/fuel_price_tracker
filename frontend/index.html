<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Fuel Tracker</title>
        <meta name="description" content="Site that tracks the price of fuel and its location">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Special+Elite&family=Varela+Round&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" referrerpolicy="origin"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.1.0/ol.css">
    </head>
    <body>
        <main>
            <header>
                <a href="index.html">
                    <img id="logo" src="assets/image.png" alt="FuelFinder Logo"/>
                    <h1>FuelFinder</h1>
                </a>
            </header>
            <section>
                <form id="location-form">
                    <div class="search-wrapper">
                        <button type="button" class="scroll-btn scroll-left" aria-label="Scroll left"> ‹ </button>
                        <div class="fuel-types-mask">
                            <div class="fuel-types">
                                <div class="fuel-container">
                                    <input type="radio" id="U91" name="fuel_type" value="U91" checked/>
                                    <label for="U91">Unleaded 91</label>
                                </div>
                                <div class="fuel-container">
                                    <input type="radio" id="P95" name="fuel_type" value="P95" />
                                    <label for="P95">Premium 95</label>
                                </div>
                                <div class="fuel-container">
                                    <input type="radio" id="P98" name="fuel_type" value="P98" />
                                    <label for="P98">Premium 98</label>
                                </div>
                                <div class="fuel-container">
                                    <input type="radio" id="E10" name="fuel_type" value="E10" />
                                    <label for="E10">Ethanol 10</label>
                                </div>
                                <div class="fuel-container">
                                    <input type="radio" id="DL" name="fuel_type" value="DL" />
                                    <label for="DL">Diesel</label>
                                </div>
                                <div class="fuel-container">
                                    <input type="radio" id="PDL" name="fuel_type" value="PDL" />
                                    <label for="PDL">Premium Diesel</label>
                                </div>
                                <div class="fuel-container">
                                    <input type="radio" id="LPG" name="fuel_type" value="LPG" />
                                    <label for="LPG">Liquified Petroleum Gas</label>
                                </div>
                                <div class="fuel-container">
                                    <input type="radio" id="EV" name="fuel_type" value="EV" />
                                    <label for="EV">Electric Charging</label>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="scroll-btn scroll-right" aria-label="Scroll right">›</button>
                    </div>
                    <div class="searchbar">
                        <input type="text" id="location" name="location" required minlength="3" placeholder="Enter location within NSW"/>
                        <input type="number" id="distance" name="distance" min="1" max="100" placeholder="Enter radius (km)" required/>
                        <input type="submit" id="search-btn" value="Find Location"/>
                    </div>
                </form>
                <div id="myMap"></div>
            </section>
        </main>
        
        <script src="https://cdn.jsdelivr.net/npm/ol@v10.1.0/dist/ol.js"></script>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <script src="ui.js" async defer></script>
        <script src="map.js" async defer></script>
    </body>
</html>
